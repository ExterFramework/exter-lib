<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="main.css">
    <title>Exter Library v2.0</title>
</head>
<body>
    <!-- Notification Container -->
    <div class="notify-container" id="notifyContainer"></div>

    <!-- Progress Bar -->
    <div class="progressbar-wrapper" id="progressbarWrapper">
        <div class="progressbar-content">
            <div class="progressbar-header">
                <span class="progressbar-label" id="progressLabel">Loading...</span>
                <span class="progressbar-percent" id="progressPercent">0%</span>
            </div>
            <div class="progressbar-track">
                <div class="progressbar-fill" id="progressFill">
                    <div class="progressbar-dot"></div>
                </div>
                <div class="progressbar-glow" id="progressGlow"></div>
            </div>
        </div>
    </div>

    <!-- Info Panel -->
    <div class="info-panel" id="infoPanel">
        <div class="info-panel-accent"></div>
        <div class="info-panel-content">
            <div class="info-panel-header">
                <div class="info-panel-icon">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 16V12M12 8H12.01M22 12C22 17.5228 17.5228 22 12 22C6.47715 22 2 17.5228 2 12C2 6.47715 6.47715 2 12 2C17.5228 2 22 6.47715 22 12Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <span class="info-panel-title" id="infoTitle">Title</span>
            </div>
            <div class="info-panel-divider"></div>
            <p class="info-panel-text" id="infoText">Description text</p>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
